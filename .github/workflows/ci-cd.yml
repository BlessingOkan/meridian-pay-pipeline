name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  # ── 1. Automated Tests ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npm test

  # ── 2. Vulnerability Scan (Trivy) ──────────────────────────────────
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 3. SBOM Generation (Syft) ──────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image for SBOM
        run: docker build -t ${{ env.IMAGE_NAME }}:sbom .

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:sbom
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # ── 4. Build, Push & Sign (Cosign) ─────────────────────────────────
  build-push-sign:
    name: Build, Push & Sign Image
    runs-on: ubuntu-latest
    needs: [trivy-scan, sbom]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write          # needed for keyless Cosign signing
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign image with Cosign (keyless)
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  # ── Pipeline Summary ───────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [test, trivy-scan, sbom, build-push-sign]
    steps:
      - name: Generate job summary
        env:
          TEST: ${{ needs.test.result }}
          TRIVY: ${{ needs.trivy-scan.result }}
          SBOM: ${{ needs.sbom.result }}
          SIGN: ${{ needs.build-push-sign.result }}
        run: |
          status_icon() {
            case "$1" in
              success)  echo "✅ Passed";;
              failure)  echo "❌ Failed";;
              skipped)  echo "⏭️ Skipped";;
              *)        echo "⚠️ $1";;
            esac
          }

          {
            echo "## CI/CD Pipeline Summary"
            echo ""
            echo "| Stage | Status |"
            echo "|-------|--------|"
            echo "| **Automated Tests** | $(status_icon "$TEST") |"
            echo "| **Trivy Vulnerability Scan** | $(status_icon "$TRIVY") |"
            echo "| **SBOM Generation (Syft)** | $(status_icon "$SBOM") |"
            echo "| **Image Sign (Cosign)** | $(status_icon "$SIGN") |"
            echo ""
            echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Triggered by:** ${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"
